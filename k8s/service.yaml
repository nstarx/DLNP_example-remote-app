apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: dashboard
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
---
# Optional: NodePort service for development/testing
apiVersion: v1
kind: Service
metadata:
  name: dashboard-nodeport
  namespace: default
spec:
  type: NodePort
  selector:
    app: dashboard
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
    protocol: TCP
    name: http