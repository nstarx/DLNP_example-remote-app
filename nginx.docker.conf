server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Health check
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # CORS headers for Module Federation cross-origin access
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers "X-Requested-With, content-type, Authorization" always;

    # Handle CORS preflight
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin * always;
    }

    # Dynamic routing: any /<branch-name>/ path serves that branch's SPA
    # Each branch app was built with base: '/<branch-name>/' so asset paths are correct
    location ~ ^/([^/]+)/(.*)$ {
        try_files $uri $uri/ /$1/index.html;
    }

    # Root landing page - index of all apps
    location = / {
        try_files /index.html =404;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        application/wasm;
}
