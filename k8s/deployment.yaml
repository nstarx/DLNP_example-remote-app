apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
      # Frontend container - nginx serving Vue.js
      - name: frontend
        image: dashboard-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      
      # Node.js middleware server
      - name: nodejs
        image: dashboard-nodejs:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
          name: api
        env:
        - name: PORT
          value: "3001"
        - name: NODE_ENV
          value: "production"
        - name: FASTAPI_URL
          value: "http://localhost:8000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
      
      # Python FastAPI backend
      - name: backend
        image: dashboard-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: fastapi
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
      
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config