# Multi-container docker-compose for local development
version: '3.8'

services:
  # Frontend - Vue.js with nginx
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: dashboard-frontend
    ports:
      - "80:80"
    depends_on:
      - nodejs
    networks:
      - dashboard-net

  # Node.js middleware server
  nodejs:
    build:
      context: .
      dockerfile: Dockerfile.nodejs
    container_name: dashboard-nodejs
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - FASTAPI_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - dashboard-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Python FastAPI backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: dashboard-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - dashboard-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  dashboard-net:
    driver: bridge